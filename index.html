<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Candy Jar Multiplayer</title>
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>
    <div id="app">
        <!-- HUD Section -->
        <div class="player-panels">
            <div class="panel">
                <small>PLAYER 1</small>
                <div id="score1" class="score">0000</div>
            </div>
            
            <div id="timer">90</div>
            
            <div class="panel">
                <small>PLAYER 2</small>
                <div id="score2" class="score">0000</div>
            </div>
        </div>

        <!-- Grid Container -->
        <div id="shared-grid-container">
            <div id="grid1" class="shared-board"></div>
        </div>

        <!-- Bottom Area for Jar and Items -->
        <div id="bottom-area">
            <div id="jar-container">
                <div id="jar-value" class="jar-display">THE JAR: 0</div>
            </div>

            <div id="item-bar">
                <div id="inventory-container">
                    <div class="item-slot power-up-slot" id="slot-bomb" data-item="bomb">
                        <span class="icon">💣</span>
                        <span class="item-count" id="count-bomb">x0</span>
                    </div>
                    <div class="item-slot power-up-slot" id="slot-dynamite" data-item="dynamite">
                        <span class="icon">🧨</span>
                        <span class="item-count" id="count-dynamite">x0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Refined Lobby Overlay -->
        <div id="overlay" class="overlay"> 
            <div class="lobby-card">
                <h1 class="logo-text">SUGAR JAR LIVE</h1>
                <small id="practice-balance">Practice Balance: --</small>
                
                <div class="lobby-section">
                    <label class="input-label">WAGER AMOUNT</label>
                    <input type="number" id="wager-input" class="glass-input" value="100" step="50">
                    <button id="btn-host" class="btn-host">HOST GAME</button>
                </div>

                <div class="neon-divider"></div>

                <div class="lobby-section">
                    <button id="btn-bot" class="btn-bot">
                        <span>PRACTICE VS BOT</span>
                        <small class="sub-text">Normal Difficulty</small>
                    </button>
                </div>

                <div class="neon-divider"></div>

                <div class="lobby-section">
                    <input type="text" id="room-id-input" class="glass-input" placeholder="Enter Room ID">
                    <button id="btn-join" class="btn-join">JOIN GAME</button>
                </div>
            </div>
        </div>

        <div id="result-overlay" class="overlay hidden"></div>
        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/fireb~ase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="js/main.js?v=1.3" type="module"></script>
</body>
</html>
